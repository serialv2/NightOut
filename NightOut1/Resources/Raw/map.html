<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NightOut Map</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; background: #0A1018; overflow: hidden; font-family: -apple-system, sans-serif; }
  #map { width: 100%; height: 100%; }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 58px;
    background: rgba(10,16,24,0.85); backdrop-filter: blur(8px);
    display: flex; align-items: center; padding: 0 12px; gap: 8px; z-index: 100;
  }
  #logo { font-size: 18px; font-weight: 700; color: #FFB627; font-style: italic; margin-right: 4px; white-space: nowrap; }
  #city-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,182,39,0.1); border: 1px solid rgba(255,182,39,0.3);
    border-radius: 999px; padding: 5px 10px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #city-btn:active { background: rgba(255,182,39,0.2); }
  .city-dot { width: 6px; height: 6px; border-radius: 50%; background: #3DB87A; }
  #city-name { font-size: 12px; font-weight: 600; color: #FFB627; }
  .city-arrow { font-size: 9px; color: #7A8FA6; }
  .spacer { flex: 1; }
  .icon-btn {
    width: 34px; height: 34px; background: rgba(255,182,39,0.1);
    border: 1px solid rgba(255,182,39,0.15); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .icon-btn:active { background: rgba(255,182,39,0.25); }
  .icon-btn.active { background: rgba(61,184,122,0.18); border-color: rgba(61,184,122,0.55); box-shadow: 0 0 14px rgba(61,184,122,0.18); }
  #avatar-btn {
    width: 40px; height: 40px; background: linear-gradient(135deg, #FFB627, #FF6B35);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #0A1018; cursor: pointer; flex-shrink: 0;
    overflow: hidden; border: 1px solid rgba(255,255,255,0.15);
  }
  #avatar-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── FILTRES ── */
  #filters {
    position: fixed; top: 62px; left: 0; right: 50px; height: 38px;
    display: flex; align-items: center; padding: 0 10px; gap: 6px;
    overflow-x: auto; overflow-y: hidden; z-index: 100; scrollbar-width: none;
  }
  #filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 5px 13px; border-radius: 999px; border: 1px solid rgba(255,182,39,0.2);
    background: rgba(10,16,24,0.7); color: #7A8FA6; font-size: 11px; white-space: nowrap;
    cursor: pointer; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .filter-chip.active { background: rgba(255,182,39,0.88); color: #0A1018; font-weight: 600; border-color: transparent; }
  .filter-chip:active { opacity: 0.7; }

  /* ── FABs ── */
  #fabs { position: fixed; top: 66px; right: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .fab {
    width: 40px; height: 40px; background: rgba(10,16,24,0.85);
    border: 1px solid rgba(255,182,39,0.25); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .fab:active { background: rgba(255,182,39,0.15); }
  .fab.secret-active { border-color: rgba(255,182,39,0.6); background: rgba(255,182,39,0.1); }

  /* ── LIVE PILL ── */
  #live-pill {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(10,16,24,0.85); border: 1px solid rgba(255,182,39,0.2);
    border-radius: 999px; padding: 5px 14px;
    display: flex; align-items: center; gap: 6px; z-index: 100; white-space: nowrap;
  }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #3DB87A; }
  #live-count { font-size: 10px; color: #7A8FA6; }

  /* ── CITY PICKER ── */
  #city-picker {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; display: none; align-items: flex-end;
  }
  #city-picker.open { display: flex; }
  #city-sheet {
    background: #131F2B; border-radius: 20px 20px 0 0;
    width: 100%; padding: 16px 0 32px;
    border-top: 1px solid rgba(255,182,39,0.2);
  }
  .sheet-handle { width: 34px; height: 3px; background: rgba(255,182,39,0.2); border-radius: 2px; margin: 0 auto 16px; }
  .sheet-title { font-size: 13px; color: #7A8FA6; text-align: center; margin-bottom: 12px; }
  .city-option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .city-option:active { background: rgba(255,182,39,0.05); }
  .city-opt-dot { width: 8px; height: 8px; border-radius: 50%; background: #3DB87A; flex-shrink: 0; }
  .city-opt-name { font-size: 15px; color: #F2E8D5; font-weight: 500; }
      ${sel ? '<span class="city-opt-check">&#10003;</span>' : ''}
  .city-option.selected .city-opt-name { color: #FFB627; }

  /* ── MARQUEURS ── */
  .bar-marker { cursor: pointer; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .bar-marker.active { transform: scale(1.12); z-index: 10; }
  .marker-card {
    background: #0F1923; border: 1px solid rgba(255,182,39,0.18);
    border-radius: 12px; padding: 8px 10px; min-width: 130px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6); position: relative;
  }
  .bar-marker.active .marker-card { border-color: rgba(255,182,39,0.5); }
  .marker-promo {
    position: absolute; top: -8px; right: 8px; background: #FF6B35;
    color: white; font-size: 8px; font-weight: 700; padding: 2px 7px; border-radius: 999px;
  }
  .marker-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .cat-icon {
    width: 20px; height: 20px; background: rgba(255,182,39,0.1);
    border: 1px solid rgba(255,182,39,0.18); border-radius: 5px;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
  }
  .marker-name { font-size: 11px; font-weight: 600; color: #F2E8D5; white-space: nowrap; }
  .gauge-row { display: flex; align-items: center; gap: 5px; }
  .gauge-bar { flex: 1; height: 3px; background: #1A2535; border-radius: 2px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .gauge-count { font-size: 10px; color: #7A8FA6; min-width: 20px; text-align: right; }
  .marker-stem { width: 1px; height: 7px; background: rgba(255,182,39,0.3); margin: 0 auto; }
  .marker-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,182,39,0.4); margin: 0 auto; }
  .bar-marker.active .marker-dot { background: #FFB627; box-shadow: 0 0 6px rgba(255,182,39,0.6); }


  /* ── BAR FESTIF : événement en cours / à venir ── */
  .event-notes {
    position: absolute;
    right: -22px;
    top: -26px;
    width: 70px;
    height: 54px;
    pointer-events: none;
    overflow: visible;
    z-index: 5;
  }
  .event-note {
    position: absolute;
    font-size: 24px;
    font-weight: 900;
    color: #FFB627;
    text-shadow: 0 0 12px rgba(255,182,39,0.95), 0 0 22px rgba(255,45,107,0.55);
    opacity: .95;
    will-change: transform;
    animation: note-dance 1.25s ease-in-out infinite;
  }
  .event-note.n1 { left: 0;  bottom: 1px;  animation-delay: 0s; }
  .event-note.n2 { left: 24px; bottom: 8px;  animation-delay: .35s; }
  .event-note.n3 { left: 48px; bottom: 0; animation-delay: .7s; }

  .bar-marker.has-event .marker-card,
  .bar-marker.has-upcoming .marker-card {
    border-color: rgba(255,182,39,0.65);
    box-shadow: 0 0 0 1px rgba(255,182,39,0.10), 0 8px 28px rgba(0,0,0,0.65);
  }
  .bar-marker.live-event .marker-card {
    background: linear-gradient(145deg, rgba(255,182,39,.98), rgba(255,107,53,.95));
    color: #0A1018;
    border-color: rgba(255,255,255,.32);
    box-shadow: 0 0 0 2px rgba(255,182,39,.22), 0 0 34px rgba(255,182,39,.75), 0 0 70px rgba(255,45,107,.38), 0 12px 34px rgba(0,0,0,.70);
    animation: live-card-pulse 1.8s ease-in-out infinite;
  }
  .bar-marker.live-event .marker-card::before {
    content: '';
    position: absolute;
    inset: -16px;
    border-radius: 24px;
    background: radial-gradient(circle, rgba(255,182,39,.38), rgba(255,45,107,.14) 42%, transparent 72%);
    z-index: -1;
    animation: live-halo 1.8s ease-in-out infinite;
  }
  .bar-marker.live-event .marker-name,
  .bar-marker.live-event .gauge-count { color: #0A1018; }
  .bar-marker.live-event .cat-icon { background: rgba(10,16,24,.16); border-color: rgba(10,16,24,.22); }
  .bar-marker.has-event .marker-dot,
  .bar-marker.has-upcoming .marker-dot {
    background: #FFB627;
    box-shadow: 0 0 10px rgba(255,182,39,0.8);
  }
  .live-badge {
    display: inline-flex; align-items:center; gap:4px;
    width: fit-content;
    margin: -1px 0 5px;
    padding: 2px 7px;
    border-radius: 999px;
    background: rgba(10,16,24,.88);
    color: #FFB627;
    font-size: 8px;
    font-weight: 900;
    letter-spacing: .35px;
    text-transform: uppercase;
  }
  .live-title {
    margin: 2px 0 5px;
    max-width: 150px;
    font-size: 10px;
    font-weight: 900;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: #0A1018;
  }
  .live-stats {
    display:flex; gap: 8px;
    margin-top: 5px;
    font-size: 9px;
    font-weight: 900;
    color: rgba(10,16,24,.86);
  }
      ${hasUpcoming ? `<div class="upcoming-badge">&#127881; ${safeUpcomingLabel}</div>` : ''}
    position: absolute; top: -8px; right: 8px;
    background: #6F35FF;
    color: white; font-size: 8px; font-weight: 800;
    padding: 2px 7px; border-radius: 999px;
    box-shadow: 0 0 14px rgba(111,53,255,.55);
  }
  @keyframes float-note {
    0%   { transform: translateY(13px) scale(.75) rotate(-12deg); opacity: 0; }
    18%  { opacity: 1; }
    70%  { opacity: .98; }
    100% { transform: translateY(-33px) scale(1.22) rotate(12deg); opacity: 0; }
  }
  @keyframes note-dance {
    0%,100% { transform: translate3d(0,0,0) scale(1) rotate(-8deg); }
    50% { transform: translate3d(0,-15px,0) scale(1.18) rotate(12deg); }
  }
  @keyframes live-card-pulse {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-2px) scale(1.025); }
  }
  @keyframes live-halo {
    0%,100% { opacity: .55; transform: scale(.96); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  /* ── MARQUEURS ÉVÉNEMENTS OFFICIELS ── */
  .event-marker { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .event-card {
    position: relative;
    min-width: 142px;
    max-width: 170px;
    border-radius: 14px;
    background: linear-gradient(145deg, rgba(255,182,39,0.95), rgba(255,107,53,0.92));
    color: #0A1018;
    padding: 8px 9px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.68);
    border: 1px solid rgba(255,255,255,0.18);
    transform: translateY(0);
    transition: transform .18s ease;
  }
  .event-marker:active .event-card { transform: translateY(-2px) scale(1.03); }
  .event-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .event-emoji { width: 22px; height: 22px; border-radius: 50%; background: rgba(10,16,24,.18); display:flex; align-items:center; justify-content:center; font-size: 13px; }
  .event-title { font-size: 11px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-bar { font-size: 9px; font-weight: 700; opacity: .78; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
  .event-date { margin-top: 3px; font-size: 9px; font-weight: 700; }
  .event-address { margin-top: 4px; font-size: 9px; font-weight: 700; opacity: .82; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
  .event-stats { margin-top: 5px; display:flex; gap: 7px; font-size: 9px; font-weight: 800; }
  .event-stem { width: 1px; height: 7px; background: rgba(255,182,39,0.45); margin: 0 auto; }
  .event-dot { width: 6px; height: 6px; border-radius: 50%; background: #FFB627; box-shadow: 0 0 8px rgba(255,182,39,.85); margin: 0 auto; }
  .mapboxgl-popup-content {
    background: #0F1923;
    color: #F2E8D5;
    border: 1px solid rgba(255,182,39,.24);
    border-radius: 16px;
    box-shadow: 0 12px 34px rgba(0,0,0,.72);
    padding: 0;
  }
  .mapboxgl-popup-tip { border-top-color: #0F1923 !important; border-bottom-color: #0F1923 !important; }
  .event-popup { min-width: 210px; max-width: 260px; padding: 14px; font-family: 'Inter', system-ui, sans-serif; }
  .event-popup-title { color:#FFB627; font-size: 15px; font-weight: 900; margin-bottom: 4px; }
  .event-popup-place { color:#F2E8D5; font-size: 12px; font-weight: 800; margin-bottom: 4px; }
  .event-popup-date, .event-popup-address { color:#A8B3C3; font-size: 11px; margin-top: 5px; line-height: 1.35; }
  .event-popup-actions { display:flex; gap: 8px; margin-top: 12px; }
  .event-popup-btn {
    flex:1; border:0; border-radius: 999px; padding: 9px 10px;
    text-align:center; font-size: 12px; font-weight: 900; text-decoration:none; cursor:pointer;
  }
  .event-popup-btn.waze { background:#33CCFF; color:#061018; }
  .event-popup-btn.details { background:#FFB627; color:#0A1018; }


  /* ── CLUSTER (bars regroupés) ── */
  .cluster-marker { cursor: pointer; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); -webkit-tap-highlight-color: transparent; }
  .cluster-marker:active { transform: scale(1.1); }
  .cluster-bubble {
    position: relative; width: 46px; height: 46px; border-radius: 50%;
    background: #0F1923; border: 1px solid rgba(255,182,39,0.3);
    box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .cluster-ring { position: absolute; inset: -4px; border-radius: 50%; border: 2px solid; opacity: 0.45; }
  .cluster-count { font-size: 16px; font-weight: 700; color: #FFB627; line-height: 1; }
  .cluster-label { font-size: 7px; color: #7A8FA6; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
  .cluster-people {
    margin: 5px auto 0; width: fit-content;
    background: #0F1923; border: 1px solid rgba(255,182,39,0.18); border-radius: 999px;
    padding: 1px 7px; font-size: 9px; color: #F2E8D5; font-weight: 600;
    display: flex; align-items: center; gap: 4px; white-space: nowrap;
  }
  .cp-dot { width: 5px; height: 5px; border-radius: 50%; }
  .user-marker {
    width: 16px; height: 16px; border-radius: 50%;
    background: #FFB627; border: 3px solid rgba(255,182,39,0.3);
    box-shadow: 0 0 12px rgba(255,182,39,0.5);
    animation: pulse-user 2s ease-in-out infinite;
  }
  .friend-marker {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #FFB627, #FF6B35);
    border: 3px solid rgba(61,184,122,0.95);
    box-shadow: 0 0 16px rgba(61,184,122,0.55), 0 8px 22px rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; color: #0A1018; cursor: pointer;
    overflow: hidden; -webkit-tap-highlight-color: transparent;
  }
  .friend-marker img { width: 100%; height: 100%; object-fit: cover; display:block; }
  .friend-marker::after {
    content:''; position:absolute; right:-1px; bottom:-1px; width:10px; height:10px;
    border-radius:50%; background:#3DB87A; border:2px solid #0A1018;
  }
  @keyframes pulse-user {
    0%,100% { box-shadow: 0 0 12px rgba(255,182,39,0.5); }
    50% { box-shadow: 0 0 20px rgba(255,182,39,0.8); }
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="logo">NightOut</div>
  <div id="city-btn" onclick="openCityPicker()">
    <div class="city-dot"></div>
    <span id="city-name">Chargement...</span>
    <span class="city-arrow">&#9662;</span>
  </div>
  <div class="spacer"></div>
  <div class="icon-btn" id="friends-map-btn" onclick="toggleFriendsOnMap()" title="Afficher mes amis">&#128101;</div>
  <div class="icon-btn">&#128276;</div>
  <div id="avatar-btn" onclick="window.location='spotiz://navigate?tab=profile'">?</div>
</div>

<div id="filters">
  <div class="filter-chip active" onclick="setFilter('all', this)">Tous</div>
  <div class="filter-chip" onclick="setFilter('live_event', this)">&#127881; En &eacute;v&eacute;nement</div>
  <div class="filter-chip" onclick="setFilter('events', this)">&#127925; &Eacute;v&eacute;nements</div>
</div>

<div id="fabs">
  <div class="fab" id="fab-secret" onclick="toggleSecretMode()">&#128123;</div>
  <div class="fab" onclick="centerOnUserOrCity()">&#128205;</div>
</div>

<div id="live-pill">
  <div class="live-dot"></div>
  <span id="live-count">0 personnes en soiree</span>
</div>

<div id="city-picker" onclick="closeCityPickerOnBg(event)">
  <div id="city-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Choisir une ville</div>
    <div id="city-list"></div>
  </div>
</div>

<div id="map"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoic2VyaWFsdiIsImEiOiJjbXBsOTB1NGswcHE4MnNyODY1NGpscmp0In0.pgg7IK2dsZnz6V0vN0wffw';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/navigation-night-v1',
  center: [2.2137, 46.2276], zoom: 5,
  attributionControl: false, logoPosition: 'bottom-left', fadeDuration: 0
});

let markers = {}, friendMarkers = {}, eventMarkers = {}, userMarker = null, activeMarkerId = null;
let isSecretMode = false, cities = [], selectedCity = null;
let barsData = [], eventsData = [], clusterMarkers = [];
let selectedFilter = 'all';
let categoryFilters = [];
const CLUSTER_RADIUS = 78; // px : en-dessous de cette distance écran, on regroupe

function gaugeColor(r) {
  if (r < 0.30) return '#3DB87A';
  if (r < 0.55) return '#FFB627';
  if (r < 0.80) return '#FF6B35';
  return '#FF2D6B';
}
function gaugeRatio(n) { return Math.min(n / 100.0, 1.0); }

function createBarMarker(bar) {
  const ratio = gaugeRatio(bar.totalPresent || 0);
  const color = gaugeColor(ratio);
  const width = Math.max(ratio * 100, 5);
  const el = document.createElement('div');
  const hasLive = !!bar.hasLiveEvent;
  const hasUpcoming = !!bar.hasUpcomingEvent && !hasLive;
  el.className = 'bar-marker'
    + (bar.hasEvent ? ' has-event' : '')
    + (hasLive ? ' live-event' : '')
    + (hasUpcoming ? ' has-upcoming' : '');

  const safeName = escapeHtml(bar.name || 'Bar');
  const safeLiveTitle = escapeHtml(bar.liveEventTitle || 'Evenement en cours');
  const safeUpcomingLabel = escapeHtml(bar.upcomingEventLabel || 'Bientot');

  el.innerHTML = `
    <div class="marker-card">
      ${hasLive ? '<div class="event-notes"><span class="event-note n1">\uD83C\uDFB5</span><span class="event-note n2">\uD83C\uDFB6</span><span class="event-note n3">\uD83C\uDFB5</span></div>' : ''}
      ${hasLive ? '<div class="live-badge">\uD83C\uDF89 EVENEMENT</div>' : ''}
      ${hasUpcoming ? `<div class="upcoming-badge">\uD83C\uDF89 ${safeUpcomingLabel}</div>` : ''}
      ${bar.hasPromo && !hasLive ? '<div class="marker-promo">Promo</div>' : ''}
      <div class="marker-head">
        <div class="cat-icon">${bar.primaryIcon || '\uD83C\uDF7A'}</div>
        <div class="marker-name">${safeName}</div>
      </div>
      ${hasLive ? `<div class="live-title">${safeLiveTitle}</div>` : ''}
      <div class="gauge-row">
        <div class="gauge-bar"><div class="gauge-fill" style="width:${width}%;background:${hasLive ? '#0A1018' : color};"></div></div>
        <div class="gauge-count">${bar.totalPresent || 0}</div>
      </div>
      ${hasLive ? `<div class="live-stats"><span>\uD83D\uDE4B ${bar.liveGoingCount || 0}</span><span>\uD83D\uDCCD ${bar.liveCheckedInCount || 0}</span></div>` : ''}
    </div>
    <div class="marker-stem"></div>
    <div class="marker-dot"></div>`;
  el.addEventListener('click', () => {
    setActiveMarker(bar.id);
    if (bar.hasLiveEvent && bar.liveEventId) {
      sendToApp('eventSelected', { eventId: bar.liveEventId, eventType: bar.liveEventType || 'official' });
    } else {
      sendToApp('barSelected', { barId: bar.id });
    }
  });
  const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
    .setLngLat([bar.longitude, bar.latitude]).addTo(map);
  markers[bar.id] = { marker, el, bar };
}

function setActiveMarker(id) {
  if (activeMarkerId && markers[activeMarkerId]) markers[activeMarkerId].el.classList.remove('active');
  if (markers[id]) { markers[id].el.classList.add('active'); activeMarkerId = id; }
}

function clearBarMarkers() {
  Object.values(markers).forEach(m => m.marker.remove());
  markers = {};
}

function clearClusterMarkers() {
  clusterMarkers.forEach(m => m.remove());
  clusterMarkers = [];
}

// Recalcule l'affichage : projette chaque bar en pixels, regroupe les proches.
function getFilteredBars() {
  if (!selectedFilter || selectedFilter === 'all') return barsData;
  if (selectedFilter === 'live_event') return barsData.filter(b => !!b.hasLiveEvent);
  if (selectedFilter === 'events') return [];

  return barsData.filter(b => {
    const slugs = Array.isArray(b.categorySlugs) ? b.categorySlugs : [];
    const primary = (b.primarySlug || '').toLowerCase();
    return primary === selectedFilter || slugs.map(x => (x || '').toLowerCase()).includes(selectedFilter);
  });
}

function renderBars() {
  clearBarMarkers();
  clearClusterMarkers();
  const visibleBars = getFilteredBars();
  if (!visibleBars.length) return;

  const points = visibleBars.map(b => {
    const p = map.project([b.longitude, b.latitude]);
    return { bar: b, x: p.x, y: p.y };
  });

  const used = new Array(points.length).fill(false);
  for (let i = 0; i < points.length; i++) {
    if (used[i]) continue;
    used[i] = true;
    const group = [points[i]];
    for (let j = i + 1; j < points.length; j++) {
      if (used[j]) continue;
      const dx = points[i].x - points[j].x;
      const dy = points[i].y - points[j].y;
      if (dx*dx + dy*dy < CLUSTER_RADIUS*CLUSTER_RADIUS) {
        used[j] = true;
        group.push(points[j]);
      }
    }
    if (group.length === 1) createBarMarker(group[0].bar);
    else createClusterMarker(group.map(g => g.bar));
  }

  // restaure le marqueur actif s'il est encore affiché individuellement
  if (activeMarkerId && markers[activeMarkerId]) {
    markers[activeMarkerId].el.classList.add('active');
  }
}

function createClusterMarker(bars) {
  const lng = bars.reduce((s,b)=>s+b.longitude,0)/bars.length;
  const lat = bars.reduce((s,b)=>s+b.latitude,0)/bars.length;
  const total = bars.reduce((s,b)=>s+(b.totalPresent||0),0);
  const color = gaugeColor(gaugeRatio(total));
  const el = document.createElement('div');
  el.className = 'cluster-marker';
  el.innerHTML = `
    <div class="cluster-bubble">
      <div class="cluster-ring" style="border-color:${color};"></div>
      <div class="cluster-count">${bars.length}</div>
      <div class="cluster-label">lieux</div>
    </div>
    <div class="cluster-people"><span class="cp-dot" style="background:${color};"></span>${total}</div>
    <div class="marker-stem"></div>
    <div class="marker-dot"></div>`;
  el.addEventListener('click', () => {
    const target = Math.min((map.getZoom() || 13) + 2.5, 18);
    map.flyTo({ center: [lng, lat], zoom: target, speed: 1.2 });
  });
  const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
    .setLngLat([lng, lat]).addTo(map);
  clusterMarkers.push(marker);
}

function clearFriendMarkers() {
  Object.values(friendMarkers).forEach(m => m.remove());
  friendMarkers = {};
}

function clearEventMarkers() {
  Object.values(eventMarkers).forEach(m => m.remove());
  eventMarkers = {};
}

function escapeAttr(value) {
  return String(value || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function createEventMarker(event) {
  if (!event.latitude || !event.longitude) return;
  const el = document.createElement('div');
  el.className = 'event-marker';
  const safeTitle = escapeHtml(event.title || 'Evenement');
  const safeBar = escapeHtml(event.barName || 'Spotiz');
  const safeAddress = escapeHtml(event.address || event.barName || 'Adresse a confirmer');
  const safeDate = escapeHtml(event.dateLabel || '');
  el.innerHTML = `
    <div class="event-card">
      <div class="event-notes"><span class="event-note n1">\uD83C\uDFB5</span><span class="event-note n2">\uD83C\uDFB6</span><span class="event-note n3">\uD83C\uDFB5</span></div>
      <div class="event-top">
        <div class="event-emoji">\uD83C\uDF89</div>
        <div style="min-width:0;flex:1;">
          <div class="event-title">${safeTitle}</div>
          <div class="event-bar">${safeBar}</div>
        </div>
      </div>
      <div class="event-date">${safeDate}</div>
      <div class="event-address">\uD83D\uDCCD ${safeAddress}</div>
      <div class="event-stats"><span>\uD83D\uDE4B ${event.goingCount || 0}</span><span>\uD83D\uDCCD ${event.checkedInCount || 0}</span></div>
    </div>
    <div class="event-stem"></div>
    <div class="event-dot"></div>`;
  const popup = new mapboxgl.Popup({ closeButton: true, closeOnClick: true, offset: 22 })
    .setHTML(buildEventPopup(event));
  el.addEventListener('click', (ev) => {
    ev.stopPropagation();
    popup.setLngLat([event.longitude, event.latitude]).addTo(map);
  });
  const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
    .setLngLat([event.longitude, event.latitude]).addTo(map);
  eventMarkers[event.id] = marker;
}
function renderEvents() {
  clearEventMarkers();
  if (selectedFilter !== 'events') return;
  eventsData.forEach(e => createEventMarker(e));
}

function buildEventPopup(event) {
  const title = escapeHtml(event.title || 'Evenement');
  const place = escapeHtml(event.barName || 'Lieu');
  const address = escapeHtml(event.address || event.barName || 'Adresse a confirmer');
  const date = escapeHtml(event.dateLabel || '');
  const wazeAddress = escapeAttr(event.address || event.barName || '');
  return `
    <div class="event-popup">
      <div class="event-popup-title">${title}</div>
      <div class="event-popup-place">${place}</div>
      <div class="event-popup-date">${date}</div>
      <div class="event-popup-address">&#128205; ${address}</div>
      <div class="event-popup-actions">
        <button class="event-popup-btn waze" onclick="sendToApp('openWaze', { latitude: ${Number(event.latitude)}, longitude: ${Number(event.longitude)}, address: '${wazeAddress}' })">Waze</button>
        <button class="event-popup-btn details" onclick="sendToApp('eventSelected', { eventId: '${escapeAttr(event.id)}', eventType: '${escapeAttr(event.sourceType || 'official')}' })">D&eacute;tails</button>
      </div>
    </div>`;
}
function createFriendMarker(friend) {
  if (!friend.latitude || !friend.longitude) return;
  const el = document.createElement('div');
  el.className = 'friend-marker';
  const initials = escapeHtml(friend.initials || 'Ami');
  if (friend.avatarUrl) {
    el.innerHTML = `<img src="${escapeAttr(friend.avatarUrl)}" alt="${escapeAttr(friend.displayName || 'Ami')}" onerror="this.remove(); this.parentElement.textContent='${initials}'">`;
  } else {
    el.textContent = initials;
  }
  el.addEventListener('click', () => sendToApp('friendSelected', { userId: friend.id }));
  const marker = new mapboxgl.Marker({ element: el, anchor: 'center' })
    .setLngLat([friend.longitude, friend.latitude]).addTo(map);
  friendMarkers[friend.id] = marker;
}

function updateBarGauge(barId, count) {
  const b = barsData.find(x => x.id === barId);
  if (b) b.totalPresent = count;
  if (markers[barId]) {
    // affiché individuellement : mise à jour en place (garde l'animation de jauge)
    const el = markers[barId].el;
    const ratio = gaugeRatio(count);
    const fill = el.querySelector('.gauge-fill');
    const cnt = el.querySelector('.gauge-count');
    if (fill) { fill.style.width = Math.max(ratio*100,5)+'%'; fill.style.background = gaugeColor(ratio); }
    if (cnt) cnt.textContent = count;
  } else {
    // dans un cluster : on recalcule pour rafraîchir le total de la pastille
    renderBars();
  }
}

function setUserPosition(lat, lng) {
  if (userMarker) { userMarker.setLngLat([lng, lat]); return; }
  const el = document.createElement('div');
  el.className = 'user-marker';
  userMarker = new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([lng, lat]).addTo(map);
}

function clearUserPosition() {
  if (!userMarker) return;
  userMarker.remove();
  userMarker = null;
}

function centerOnCity() {
  if (!selectedCity) return;
  map.flyTo({ center: [selectedCity.longitude, selectedCity.latitude], zoom: selectedCity.zoomLevel || 13, speed: 1.2 });
}

function centerOnUserOrCity() {
  if (userMarker) {
    const p = userMarker.getLngLat();
    map.flyTo({ center: [p.lng, p.lat], zoom: 15, speed: 1.2 });
    return;
  }
  centerOnCity();
}

function setFilter(filter, el) {
  selectedFilter = (filter || 'all').toLowerCase();
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  renderBars();
  renderEvents();
  sendToApp('filterChanged', { filter: selectedFilter });
}

function loadCategoryFilters(json) {
  try {
    categoryFilters = JSON.parse(json || '[]') || [];
    const container = document.getElementById('filters');
    const current = selectedFilter || 'all';

    const base = [
      { slug: 'all', label: 'Tous' },
      { slug: 'live_event', label: '\uD83C\uDF89 En evenement' },
      { slug: 'events', label: '\uD83C\uDFB5 Evenements' }
    ];

    const dynamic = categoryFilters
      .filter(c => c && c.slug && c.name)
      .sort((a,b) => (a.sortOrder || 0) - (b.sortOrder || 0))
      .map(c => ({
        slug: String(c.slug).toLowerCase(),
        label: `${c.icon || ''} ${c.name || ''}`.trim()
      }));

    const all = [...base, ...dynamic];
    container.innerHTML = all.map(f =>
      `<div class="filter-chip ${f.slug === current ? 'active' : ''}" onclick="setFilter('${escapeAttr(f.slug)}', this)">${escapeHtml(f.label)}</div>`
    ).join('');

    if (!all.some(f => f.slug === current)) {
      selectedFilter = 'all';
      const first = container.querySelector('.filter-chip');
      if (first) first.classList.add('active');
    }
  } catch(e) {
    console.log('loadCategoryFilters error', e);
  }
}

function toggleSecretMode() {
  isSecretMode = !isSecretMode;
  document.getElementById('fab-secret').classList.toggle('secret-active', isSecretMode);
  if (isSecretMode) clearUserPosition();
  sendToApp('toggleSecretMode', { active: isSecretMode });
}

function openCityPicker() {
  document.getElementById('city-picker').classList.add('open');
}
function closeCityPicker() {
  document.getElementById('city-picker').classList.remove('open');
}
function closeCityPickerOnBg(e) {
  if (e.target === document.getElementById('city-picker')) closeCityPicker();
}
function selectCity(city) {
  selectedCity = city;
  document.getElementById('city-name').textContent = city.name;
  renderCityList();
  closeCityPicker();
  map.flyTo({ center: [city.longitude, city.latitude], zoom: city.zoomLevel || 13, speed: 1.4 });
  sendToApp('cityChanged', { cityId: city.id, cityName: city.name });
}
function renderCityList() {
  const list = document.getElementById('city-list');
  list.innerHTML = cities.map(c => {
    const sel = selectedCity && selectedCity.id === c.id;
    return `<div class="city-option ${sel ? 'selected' : ''}" onclick='selectCity(${JSON.stringify(c)})'>
      <div class="city-opt-dot"></div>
      <span class="city-opt-name">${c.name}</span>
      ${sel ? '<span class="city-opt-check">&#10003;</span>' : ''}
    </div>`;
  }).join('');
}

function toggleFriendsOnMap() {
  sendToApp('toggleFriendsOnMap', {});
}

function setFriendsButtonActive(active) {
  const btn = document.getElementById('friends-map-btn');
  if (btn) btn.classList.toggle('active', !!active);
}

function setCurrentUser(json) {
  try {
    const user = JSON.parse(json || '{}');
    const btn = document.getElementById('avatar-btn');
    if (!btn) return;
    const initials = escapeHtml(user.initials || '?');
    if (user.avatarUrl) {
      btn.innerHTML = `<img src="${escapeAttr(user.avatarUrl)}" alt="profil" onerror="this.remove(); this.parentElement.textContent='${initials}'">`;
    } else {
      btn.textContent = initials;
    }
  } catch(e) { console.log('setCurrentUser error', e); }
}

function sendToApp(action, data) {
  const payload = JSON.stringify({ action, ...data });

  // Android : bridge natif injecté par MapPage.xaml.cs
  if (window.AndroidBridge && window.AndroidBridge.postMessage) {
    window.AndroidBridge.postMessage(payload);
    return;
  }

  // iOS : si un bridge WKWebView est ajouté plus tard
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.iOSBridge) {
    window.webkit.messageHandlers.iOSBridge.postMessage(payload);
    return;
  }

  // Fallback iPhone/MAUI : interception par WebView.Navigating côté C#
  window.location.href = 'spotiz://message?payload=' + encodeURIComponent(payload);
}

window.NightOutMap = {
  loadBars: function(json) {
    barsData = JSON.parse(json);
    activeMarkerId = null;
    renderBars();
  },
  loadEvents: function(json) {
    eventsData = JSON.parse(json);
    renderEvents();
  },
  loadFriends: function(json) {
    clearFriendMarkers();
    JSON.parse(json || '[]').forEach(f => createFriendMarker(f));
  },
  setCurrentUser: function(json) {
    setCurrentUser(json);
  },
  setFriendsButtonActive: function(active) {
    setFriendsButtonActive(!!active);
  },
  updateGauge: function(barId, count) {
    updateBarGauge(barId, parseInt(count));
  },
  updateUserPosition: function(lat, lng) {
    if (isSecretMode) return;
    setUserPosition(parseFloat(lat), parseFloat(lng));
  },
  clearUserPosition: function() {
    clearUserPosition();
  },
  setSecretMode: function(active) {
    isSecretMode = active === true || active === 'true';
    const btn = document.getElementById('fab-secret');
    if (btn) btn.classList.toggle('secret-active', isSecretMode);
    if (isSecretMode) clearUserPosition();
  },
  centerOn: function(lat, lng, zoom) {
    map.flyTo({ center: [parseFloat(lng), parseFloat(lat)], zoom: parseFloat(zoom)||13, speed: 1.2 });
  },
  loadCategoryFilters: function(json) {
    loadCategoryFilters(json);
  },
  loadCities: function(json) {
    cities = JSON.parse(json);
    if (cities.length > 0) {
      selectedCity = selectedCity || cities[0];
      document.getElementById('city-name').textContent = selectedCity.name;
      renderCityList();
      // Important : on ne recentre plus ici.
      // Le ViewModel décide une seule fois : GPS utilisateur -> ville sélectionnée -> ville par défaut.
    }
  },
  updateLiveCount: function(count) {
    document.getElementById('live-count').textContent = parseInt(count) + ' personnes en evenement';
  }
};

map.on('load', () => {
  sendToApp('mapReady', {});
  if (window.__CITIES__ && window.__CITIES__.length > 0) {
    NightOutMap.loadCities(JSON.stringify(window.__CITIES__));
  }
});

// Recalcule le regroupement à chaque fin de déplacement ou de zoom
let reclusterTimer = null;
// Sur un zoom : les distances pixel changent → on recalcule les clusters.
map.on('zoomend', () => {
  if (reclusterTimer) clearTimeout(reclusterTimer);
  reclusterTimer = setTimeout(renderBars, 120);
});

// Sur un simple pan : les clusters ne changent pas.
// Mapbox GL repositionne les Marker via transform CSS automatiquement —
// aucun travail JS nécessaire, la carte reste fluide.
</script>
</body>
</html>
